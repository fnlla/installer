name: Installer CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer
        run: composer validate --no-interaction

      - name: Lint PHP
        run: |
          php -l bin/fnlla
          php -l src/InstallerApplication.php

      - name: CLI help smoke
        run: php bin/fnlla --help
