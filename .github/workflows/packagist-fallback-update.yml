name: Packagist Fallback Update

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-packagist:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Packagist update when secrets are configured
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PACKAGIST_USERNAME:-}" ] || [ -z "${PACKAGIST_API_TOKEN:-}" ]; then
            echo "PACKAGIST_USERNAME/PACKAGIST_API_TOKEN not set. Skipping fallback update."
            exit 0
          fi
          payload=$(printf '{"username":"%s","apiToken":"%s"}' "$PACKAGIST_USERNAME" "$PACKAGIST_API_TOKEN")
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://packagist.org/api/update-package?package=fnlla/installer"
