name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match vX.Y.Z (got: $version)"
            exit 1
          fi

      - name: Ensure changelog entry exists
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if ! grep -Fq "## [$version] -" CHANGELOG.md; then
            echo "Missing changelog section for $version in CHANGELOG.md"
            exit 1
          fi

      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\] -" {capture=1; next}
            capture && $0 ~ "^## \\[" {exit}
            capture {print}
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release notes extraction produced empty output."
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag already exists: $version"
            exit 1
          fi
          git tag "$version"
          git push origin "$version"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          gh release create "$version" \
            --title "$version" \
            --notes-file RELEASE_NOTES.md
